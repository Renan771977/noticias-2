<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../ico/news.ico">
    <link rel="stylesheet" href="../css/formulario.css">
    <script src="../js/formulario.js"></script>
    <title>Cadastro de Notícias</title>
</head>

<body class="claro">
    <header>
        <button onclick="alterar_tema()">Tema</button>
        <img src="../img/news.png" alt="Notícia" onclick="abrir_lightbox(this)">
        <h1>Cadastro de Notícias</h1>
    </header>

    <nav>
        <ul>
            <li>
                <a href="noticias.html">Notícias</a>
            </li>
            <li>
                <a href="formulario.html">Formulário</a>
            </li>
        </ul>
    </nav>

    <main>
        <section class="formulario">
            <h2>Nova Notícia</h2>

            <form onsubmit="cadastrar_noticia(event)">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" required>

                <label for="conteudo">Conteúdo</label>
                <textarea id="conteudo" rows="6" required></textarea>

                <label for="imagem">Imagem (URL)</label>
                <input type="text" id="imagem" required>

                <label for="link">Link da notícia</label>
                <input type="text" id="link" required>

                <button type="submit">Cadastrar Notícia</button>
            </form>

            <div id="mensagem"></div>
        </section>
    </main>

    <footer></footer>
</body>

</html>
